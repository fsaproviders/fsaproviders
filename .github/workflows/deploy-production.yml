name: Deploy to Kinsta Production

# -----------------------------------------------------------------------------
# Triggers on push to `main`. Deploys to Kinsta live.
#
# SAFETY: Uses a GitHub Environment called "production" — configure it with
# required reviewers (Settings → Environments → production → Required reviewers)
# so every production deploy needs manual approval.
# -----------------------------------------------------------------------------
#
# REQUIRED GITHUB SECRETS (scoped to the "production" environment):
#   PROD_KINSTA_SSH_HOST
#   PROD_KINSTA_SSH_PORT
#   PROD_KINSTA_SSH_USER
#   PROD_KINSTA_SSH_KEY
#   PROD_KINSTA_PATH
# -----------------------------------------------------------------------------

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Rsync to Kinsta production
    runs-on: ubuntu-latest
    environment: production  # Requires manual approval if configured

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.PROD_KINSTA_SSH_KEY }}
          SSH_HOST: ${{ secrets.PROD_KINSTA_SSH_HOST }}
          SSH_PORT: ${{ secrets.PROD_KINSTA_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy child theme
        env:
          SSH_USER: ${{ secrets.PROD_KINSTA_SSH_USER }}
          SSH_HOST: ${{ secrets.PROD_KINSTA_SSH_HOST }}
          SSH_PORT: ${{ secrets.PROD_KINSTA_SSH_PORT }}
          REMOTE_PATH: ${{ secrets.PROD_KINSTA_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.git*' --exclude='node_modules' \
            -e "ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT" \
            wp-content/themes/mylisting-child/ \
            "$SSH_USER@$SSH_HOST:$REMOTE_PATH/wp-content/themes/mylisting-child/"

      - name: Deploy fsa-account-menu-manager
        env:
          SSH_USER: ${{ secrets.PROD_KINSTA_SSH_USER }}
          SSH_HOST: ${{ secrets.PROD_KINSTA_SSH_HOST }}
          SSH_PORT: ${{ secrets.PROD_KINSTA_SSH_PORT }}
          REMOTE_PATH: ${{ secrets.PROD_KINSTA_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.git*' --exclude='node_modules' \
            -e "ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT" \
            wp-content/plugins/fsa-account-menu-manager/ \
            "$SSH_USER@$SSH_HOST:$REMOTE_PATH/wp-content/plugins/fsa-account-menu-manager/"

      - name: Deploy fsa-identity-card
        env:
          SSH_USER: ${{ secrets.PROD_KINSTA_SSH_USER }}
          SSH_HOST: ${{ secrets.PROD_KINSTA_SSH_HOST }}
          SSH_PORT: ${{ secrets.PROD_KINSTA_SSH_PORT }}
          REMOTE_PATH: ${{ secrets.PROD_KINSTA_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.git*' --exclude='node_modules' \
            -e "ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT" \
            wp-content/plugins/fsa-identity-card/ \
            "$SSH_USER@$SSH_HOST:$REMOTE_PATH/wp-content/plugins/fsa-identity-card/"

      - name: Deploy fsa-discount-panel
        env:
          SSH_USER: ${{ secrets.PROD_KINSTA_SSH_USER }}
          SSH_HOST: ${{ secrets.PROD_KINSTA_SSH_HOST }}
          SSH_PORT: ${{ secrets.PROD_KINSTA_SSH_PORT }}
          REMOTE_PATH: ${{ secrets.PROD_KINSTA_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.git*' --exclude='node_modules' \
            -e "ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT" \
            wp-content/plugins/fsa-discount-panel/ \
            "$SSH_USER@$SSH_HOST:$REMOTE_PATH/wp-content/plugins/fsa-discount-panel/"

      - name: Deploy fsahsa-sync
        env:
          SSH_USER: ${{ secrets.PROD_KINSTA_SSH_USER }}
          SSH_HOST: ${{ secrets.PROD_KINSTA_SSH_HOST }}
          SSH_PORT: ${{ secrets.PROD_KINSTA_SSH_PORT }}
          REMOTE_PATH: ${{ secrets.PROD_KINSTA_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.git*' --exclude='node_modules' \
            -e "ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT" \
            wp-content/plugins/fsahsa-sync/ \
            "$SSH_USER@$SSH_HOST:$REMOTE_PATH/wp-content/plugins/fsahsa-sync/"

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/id_ed25519
