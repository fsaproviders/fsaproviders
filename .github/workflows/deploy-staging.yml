name: Deploy to Kinsta Staging

# -----------------------------------------------------------------------------
# Triggers on push to `staging`. Rsyncs the child theme + all four custom
# plugins to Kinsta staging. Full sync every time — rsync only transfers
# changed files on the wire, but evaluates every tracked folder.
# -----------------------------------------------------------------------------
#
# REQUIRED GITHUB SECRETS (Settings → Secrets and variables → Actions):
#   STAGING_KINSTA_SSH_HOST  — SSH host/IP from MyKinsta → Info
#   STAGING_KINSTA_SSH_PORT  — SSH port from MyKinsta → Info
#   STAGING_KINSTA_SSH_USER  — SSH username from MyKinsta → Info
#   STAGING_KINSTA_SSH_KEY   — Private SSH key (public key installed on Kinsta)
#   STAGING_KINSTA_PATH      — Environment path, e.g. /www/sitename_123/public
#
# IP ALLOWLIST: If SSH allowlist is enabled in MyKinsta, GitHub Actions is
# blocked (their IPs are dynamic). Disable allowlist on staging, or remove
# this workflow and deploy manually.
# -----------------------------------------------------------------------------

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  deploy:
    name: Rsync to Kinsta staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.STAGING_KINSTA_SSH_KEY }}
          SSH_HOST: ${{ secrets.STAGING_KINSTA_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_KINSTA_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy child theme
        env:
          SSH_USER: ${{ secrets.STAGING_KINSTA_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_KINSTA_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_KINSTA_SSH_PORT }}
          REMOTE_PATH: ${{ secrets.STAGING_KINSTA_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.git*' --exclude='node_modules' \
            -e "ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT" \
            wp-content/themes/mylisting-child/ \
            "$SSH_USER@$SSH_HOST:$REMOTE_PATH/wp-content/themes/mylisting-child/"

      - name: Deploy fsa-account-menu-manager
        env:
          SSH_USER: ${{ secrets.STAGING_KINSTA_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_KINSTA_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_KINSTA_SSH_PORT }}
          REMOTE_PATH: ${{ secrets.STAGING_KINSTA_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.git*' --exclude='node_modules' \
            -e "ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT" \
            wp-content/plugins/fsa-account-menu-manager/ \
            "$SSH_USER@$SSH_HOST:$REMOTE_PATH/wp-content/plugins/fsa-account-menu-manager/"

      - name: Deploy fsa-identity-card
        env:
          SSH_USER: ${{ secrets.STAGING_KINSTA_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_KINSTA_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_KINSTA_SSH_PORT }}
          REMOTE_PATH: ${{ secrets.STAGING_KINSTA_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.git*' --exclude='node_modules' \
            -e "ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT" \
            wp-content/plugins/fsa-identity-card/ \
            "$SSH_USER@$SSH_HOST:$REMOTE_PATH/wp-content/plugins/fsa-identity-card/"

      - name: Deploy fsa-discount-panel
        env:
          SSH_USER: ${{ secrets.STAGING_KINSTA_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_KINSTA_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_KINSTA_SSH_PORT }}
          REMOTE_PATH: ${{ secrets.STAGING_KINSTA_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.git*' --exclude='node_modules' \
            -e "ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT" \
            wp-content/plugins/fsa-discount-panel/ \
            "$SSH_USER@$SSH_HOST:$REMOTE_PATH/wp-content/plugins/fsa-discount-panel/"

      - name: Deploy fsahsa-sync
        env:
          SSH_USER: ${{ secrets.STAGING_KINSTA_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_KINSTA_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_KINSTA_SSH_PORT }}
          REMOTE_PATH: ${{ secrets.STAGING_KINSTA_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.git*' --exclude='node_modules' \
            -e "ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT" \
            wp-content/plugins/fsahsa-sync/ \
            "$SSH_USER@$SSH_HOST:$REMOTE_PATH/wp-content/plugins/fsahsa-sync/"

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/id_ed25519
